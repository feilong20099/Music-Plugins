name: 自动生成群晖地址的插件文件

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install loguru httpx ujson
          pip list | grep -E "loguru|httpx|ujson"

      - name: 生成插件文件（核心）
        run: |
          touch build.log
          mkdir -p ./dist
          # 运行脚本并记录日志
          python src/main.py 2>&1 | tee -a build.log
          # 验证文件生成
          if [ -f "./dist/plugins.json" ]; then
            echo "✅ 插件文件生成成功！预览URL替换结果："
            grep -E '"url": "http://7se.de5.net:8888/music/"' ./dist/plugins.json && echo "✅ URL已替换为群晖地址" || echo "❌ URL未替换"
            # 关键：把生成的文件复制到临时目录（避免切换分支后丢失）
            mkdir -p ./temp_dist
            cp -r ./dist/* ./temp_dist/
          else
            echo "❌ 插件文件生成失败"
            cat build.log
            exit 1
          fi

      - name: 推送文件到dist分支
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 切换到dist分支（无则创建）
          git checkout --orphan dist
          # 清空旧内容
          rm -rf *
          # 从临时目录复制文件（核心修复：路径正确）
          cp -r ../temp_dist/* .
          # 提交并推送
          git add .
          git commit -m "Auto update plugins $(date +'%Y-%m-%d %H:%M:%S')"
          git push -f origin dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
        if: always()
