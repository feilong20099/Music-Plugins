name: 自动生成群晖地址的插件文件

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码（包含所有分支）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史和分支

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install loguru httpx ujson
          pip list | grep -E "loguru|httpx|ujson"

      - name: 生成插件文件（核心：在main分支完成所有生成）
        run: |
          # 提前创建日志文件
          touch build.log
          # 确保dist目录存在
          mkdir -p ./dist
          # 运行脚本并记录日志
          python src/main.py 2>&1 | tee -a build.log
          # 验证文件生成
          if [ -f "./dist/plugins.json" ]; then
            echo "✅ 插件文件生成成功！预览URL："
            grep -E '"url": "http://7se.de5.net:8888/music/"' ./dist/plugins.json | head -5
            # 列出生成的文件（排查用）
            echo "✅ 生成的文件列表："
            ls -l ./dist/
          else
            echo "❌ 插件文件生成失败"
            cat build.log
            exit 1
          fi

      - name: 推送文件到dist分支（终极修复：直接操作dist分支）
        run: |
          # 配置git用户
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查dist分支是否存在，不存在则创建空分支
          if git show-ref --verify --quiet refs/heads/dist; then
            git checkout dist
          else
            git checkout --orphan dist
            git rm -rf .  # 清空空分支的初始内容
          fi
          
          # 从main分支的dist目录复制所有文件到当前dist分支
          git checkout main -- ./dist/*
          # 移动文件到根目录（符合你的需求）
          mv ./dist/* .
          rm -rf ./dist  # 删除多余目录
          
          # 验证复制结果
          echo "✅ dist分支根目录文件列表："
          ls -l
          
          # 提交并强制推送（覆盖旧内容）
          git add .
          git commit -m "Auto update plugins $(date +'%Y-%m-%d %H:%M:%S')"
          git push -f origin dist
          
          # 切回main分支（避免后续操作异常）
          git checkout main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
        if: always()
