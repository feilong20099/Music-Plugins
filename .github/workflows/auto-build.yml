name: 自动生成群晖地址的插件文件

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RETRY_COUNT: 3
  RETRY_DELAY: 5
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 明确赋予读写权限
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install loguru==0.7.2 httpx==0.27.0 ujson==5.10.0
          pip list | grep -E "loguru|httpx|ujson"

      - name: 运行脚本生成插件文件（核心）
        run: |
          # 确保 dist 目录存在
          mkdir -p ./dist
          # 运行脚本并输出详细日志
          python src/main.py 2>&1 | tee build.log
          # 验证文件是否生成
          if [ ! -f "./dist/plugins.json" ]; then
            echo "❌ 未生成 plugins.json，日志："
            cat build.log
            exit 1
          else
            echo "✅ 生成成功，预览内容："
            cat ./dist/plugins.json | head -20
          fi

      - name: 推送生成的文件到 dist 分支
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 切换到 dist 分支（无则创建）
          git checkout --orphan dist
          # 清空分支旧内容（保留 .git 目录）
          rm -rf *
          # 复制生成的文件到分支根目录
          cp -r ./dist/* .
          # 提交并推送
          git add .
          git commit -m "Auto update plugins $(date +'%Y-%m-%d %H:%M:%S')"
          git push -f origin dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传日志（排查用）
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
        if: always()
