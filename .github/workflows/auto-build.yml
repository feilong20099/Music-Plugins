name: 自动生成群晖地址的插件文件

# 触发条件：手动触发 + 每天凌晨2点自动跑
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# 环境变量：强制用Node24，避免弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须给写权限，否则推不动代码

    steps:
      # 1. 拉取main分支代码（只拉main，避免干扰）
      - name: 拉取main分支代码
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. 配置Python环境
      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装脚本依赖
      - name: 安装Python依赖包
        run: |
          pip install --upgrade pip
          pip install loguru httpx ujson
          pip list | grep -E "loguru|httpx|ujson"

      # 4. 核心：生成插件文件（在main分支环境里完成）
      - name: 生成带群晖地址的插件文件
        run: |
          # 清空旧dist目录，避免残留
          rm -rf ./dist && mkdir -p ./dist
          touch build.log
          # 跑脚本，把日志也存下来
          python src/main.py 2>&1 | tee -a build.log
          # 验证生成结果（看一眼plugins.json是不是对的）
          echo "✅ 生成的plugins.json预览："
          cat ./dist/plugins.json | head -20
          echo "✅ 生成的JS文件列表："
          ls -l ./dist/
          # 关键：把生成的文件先挪到仓库外的临时目录，彻底避免分支切换丢失
          mkdir -p /tmp/dist_files
          cp -r ./dist/* /tmp/dist_files/

      # 5. 核心修复：推送文件到dist分支（从/tmp临时目录复制，不再依赖./dist）
      - name: 推送生成的文件到dist分支
        run: |
          # 配置Git用户（必须，否则提交不了）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 切换到dist分支（不存在就创建空分支）
          if git rev-parse --verify dist >/dev/null 2>&1; then
            git checkout dist
          else
            git checkout --orphan dist
            git rm -rf .  # 清空空分支的初始内容
          fi

          # 清空dist分支所有旧内容
          rm -rf *
          # 从/tmp临时目录复制新生成的文件（这里绝对不会找不到！）
          cp -r /tmp/dist_files/* .
          # 删掉多余目录
          rm -rf ./dist

          # 验证要推送的文件
          echo "✅ 准备推送的文件："
          ls -l
          echo "✅ 最终plugins.json预览："
          cat plugins.json | head -20

          # 提交+强制推送（覆盖旧内容）
          git add .
          git commit -m "Auto update plugins with 7se.de5.net $(date +'%Y-%m-%d %H:%M:%S')" || echo "无变更，跳过提交"
          git push -f origin dist

          # 切回main分支，避免后续操作乱掉
          git checkout main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. 上传日志（不管成功失败都传，方便排查）
      - name: 上传运行日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
        if: always()
